name: Release

on:
  push:
    branches:
      - 'master'
    tags:
      - v*

# Cancel in-flight runs of the same ref so a flurry of pushes only builds the
# tip commit. Tag pushes are kept separate from branch pushes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'
  FLUTTER_CHANNEL: 'stable'
  JAVA_VERSION: '17'

jobs:
  build_upload:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            artifact_name: release-apk
            artifact_path: build/app/outputs/apk/release/*.apk
          - target: ios
            os: macos-14
            artifact_name: release-ios
            artifact_path: build/Eros-N_*.ipa

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get app version
        id: get_version
        shell: bash
        run: |
          app_version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "app_version=${app_version}" >> "$GITHUB_ENV"
          echo "App version: ${app_version}"

      - name: Cache CocoaPods (iOS)
        if: matrix.target == 'ios'
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Decode keystore (Android)
        if: matrix.target == 'android'
        env:
          ENCODED_KEYSTORE: ${{ secrets.ENCODED_KEYSTORE }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 -di > android/app/keystore.jks

      - name: Setup Java JDK ${{ env.JAVA_VERSION }} (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter pub get
        run: |
          git config --global core.longpaths true
          flutter pub get

      - name: Build APK (Android)
        if: matrix.target == 'android'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Build iOS app (no codesign)
        if: matrix.target == 'ios'
        run: |
          sed -i '' 's/com.dev.honjow.erosn/com.honjow.erosn/g' 'ios/Runner.xcodeproj/project.pbxproj'
          cd ios && pod install --repo-update && cd ..
          flutter build ios --release --no-codesign

      - name: Thin iOS payload
        if: matrix.target == 'ios'
        run: sh scripts/thin-payload.sh build/ios/iphoneos/*.app

      - name: Package IPA
        if: matrix.target == 'ios'
        run: |
          cd build
          mkdir -p Payload
          mv ios/iphoneos/*.app Payload
          zip -9 "Eros-N_${{ env.app_version }}.ipa" -r Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'stable') && !contains(github.ref, 'alpha') && !contains(github.ref, 'rc')
    name: Publish
    needs: build_upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get app version
        id: get_version
        shell: bash
        run: |
          app_version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "app_version=${app_version}" >> "$GITHUB_ENV"
          echo "App version: ${app_version}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: List artifacts
        run: ls -R /tmp/artifacts

      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/artifacts/release-apk/*.apk,/tmp/artifacts/release-ios/*.ipa
          tag: ${{ github.ref_name }}
          bodyFile: changelog/v${{ env.app_version }}.md
          prerelease: ${{ contains(github.ref, 'pre') }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          replacesArtifacts: true
