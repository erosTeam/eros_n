name: eros_n
description: An unofficial nhentai app.

publish_to: 'none'
version: 1.0.22+22

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9
  collection: ^1.19.1
  logger: ^2.7.0
  path_provider: ^2.1.5
  intl: ^0.20.0
  dynamic_color: ^1.8.1
  english_words: ^4.0.0
  flutter_inappwebview: ^6.1.5
  http: ^1.6.0
  webview_flutter: ^4.0.2
  html: ^0.15.6
  # database: migrated from isar to objectbox
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^11.0.0
  flutter_cache_manager: ^3.4.1
  octo_image: ^2.1.0
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.2
  flutter_list_view: ^1.1.29
  tuple: ^2.0.2
  waterfall_flow: ^3.1.1
  hooks_riverpod: ^2.6.1
  auto_route: ^11.1.0
  flutter_smart_dialog: ^4.9.3
  sliver_tools: ^0.2.12
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  photo_view: ^0.15.0
  easy_image_viewer: ^1.5.1
  async_builder: ^1.3.1+1
  preload_page_view: ^0.2.0
  flutter_hooks: ^0.20.5
  url_launcher: ^6.3.2
  # replaced deprecated share with share_plus
  share_plus: ^13.1.0
  copy_with_extension: ^14.0.0
  path: ^1.9.1
  archive: ^4.0.9
  package_info_plus: ^10.1.0
  rotated_corner_decoration: ^2.1.0+1
  # replaced window_size (archived) + bitsdojo_window with window_manager
  window_manager: ^0.5.1
  webview_windows:
    git:
      url: https://github.com/xioxin/flutter-webview-windows.git
      ref: 4837e6d
  system_network_proxy: #^1.0.2
    git:
      url: https://github.com/honjow/system_network_proxy.git
      path: system_network_proxy
  system_proxy: ^0.1.0
  keframe: ^3.0.0
  dropdown_button2: ^2.3.9
  scrollable_positioned_list: ^0.3.8
  zoom_widget: ^2.0.1
  zoom_pinch_overlay: ^1.4.3
  gesture_zoom_box: ^0.0.4
  flutter_keyboard_visibility: ^5.4.0
  flutter_typeahead: ^4.8.0

  fluentui_system_icons: ^1.1.273
  palette_generator: ^0.3.3+7
  nil: ^1.1.1
  open_by_default:
    git:
      url: https://github.com/honjow/open_by_default.git
  flutter_android_volume_keydown:
    git:
      url: https://github.com/honjow/flutter_android_volume_keydown.git
      ref: dev
  # replaced deprecated wakelock with wakelock_plus
  wakelock_plus: ^1.6.0
  uuid: ^4.5.3
  animations: ^2.1.2
  flutter_socks_proxy: ^0.0.3

  clock: any
dev_dependencies:
  # flutter pub run build_runner build --delete-conflicting-outputs
  # flutter pub run build_runner watch --delete-conflicting-outputs
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  copy_with_extension_gen: ^14.0.0
  objectbox_generator: ^5.3.1
  auto_route_generator: ^10.5.0
  index_generator: ^4.1.2
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  # flutter pub run intl_utils:generate
  intl_utils: ^2.8.14
  nhentai: ^1.0.0-dev.9


flutter:
  uses-material-design: true

flutter_intl:
  enabled: true
  class_name: L10n


# flutter pub run index_generator
index_generator:
  exclude:
    - '**.g.dart'
    - '**.freezed.dart'
  indexes:
    - path: lib/component/models
      name: index
    - path: lib/common/parser
      name: parser
